<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Эльдарадо — Ведущий</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">

        <!-- Заголовок -->
        <header>
            <h1>Эльдарадо</h1>
            <p class="subtitle">Профессиональный ведущий мероприятий</p>
            <p class="experience">Более 10 лет опыта проведения свадеб, открытий, презентаций и любых мероприятий</p>
        </header>

        <!-- Список мероприятий -->
        <section class="events">
            <h2>Мероприятия</h2>
            <ul>
                <li>Свадьбы</li>
                <li>Открытия</li>
                <li>Презентации</li>
                <li>Все мероприятия</li>
            </ul>
        </section>

        <!-- Фото -->
        <section class="photos">
            <img src="img/foto1.jpg" alt="Фото 1" class="foto">
            <img src="img/foto2.jpg" alt="Фото 2" class="foto">
        </section>

        <!-- Контакты -->
        <section class="contact">
            <h2>Контакты</h2>
            <p>Телефон: +7 775 131 6762</p>
        </section>

    </div>

</body>
</html>
